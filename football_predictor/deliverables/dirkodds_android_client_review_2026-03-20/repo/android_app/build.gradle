plugins {
    id 'com.android.application'
}

android {
    namespace 'com.urbden.game'
    compileSdk 35

    signingConfigs {
        release {
            initWith signingConfigs.debug
        }
    }

    defaultConfig {
        applicationId "com.driptech.dirkodds.mobile.preview"
        minSdk 24
        targetSdk 35
        versionCode 5
        versionName "0.9-mobile-preview"
    }

    buildTypes {
        release {
            minifyEnabled false
            signingConfig signingConfigs.release
        }
    }

}

dependencies {
}
