name: Workspace Health

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  workspace-health:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install workspace requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run curated workspace health check
        run: python tools/workspace_health.py --skip-pip-check
